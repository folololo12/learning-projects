tabela = ["druzyna1", "druzyna2","druzyna3", "druzyna4","druzyna5", "druzyna6"]

        
function tablica(tabela){
    let leadboard = []
    for(let i = 0; i< tabela.length; i++){
        for(let j = i+1; j< tabela.length; j++){
                leadboard.push([(tabela[i]), (tabela[j])])
        
        }
    }
    return leadboard
}

let leadboard = tablica(tabela)

});

    let wyn 
  leadboard.forEach((mecz, index) => {

    statystyki[Mecz2].M += 1

    statystyki[Mecz2].Roznica += (GoleB - GoleA) 
        if(GoleA > GoleB){

})
 tabela.sort(function(a, b) {

    let pkt = statystyki[b].PKT - statystyki[a].PKT

    let bilans = (statystyki[b].Bplus - statystyki[b].Bminus) -
                 (statystyki[a].Bplus - statystyki[a].Bminus)
    if (bilans !== 0) return bilans

        })
